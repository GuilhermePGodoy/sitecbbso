<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Vôlei CBBSO</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" type="image/png" href="./cbbso-logo-512x512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
</head>

<body class="bg-login">

    <main class="login-container">
        <div class="login-box">
            <img src="images/cbbso-logo-512x512.png" alt="Logo CBBSO" class="logo-login">
            <h2>Área Administrativa</h2>
            <p>Acesso restrito à diretoria e comissão técnica.</p>

            <form action="#" method="POST" class="login-form">
                <div class="form-group">
                    <label for="usuario">Usuário ou E-mail</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Digite seu usuário" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit" class="btn-entrar">Entrar no Sistema</button>
            </form>

            <a href="index.html" class="link-voltar">&larr; Voltar para o site principal</a>
        </div>
    </main>

</body>

</html>
